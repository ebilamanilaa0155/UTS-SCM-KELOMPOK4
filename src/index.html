<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }

        .calculator {
            width: 250px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        #display {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 20px;
            padding: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            background: #ddd;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #288461;
        }

        button:disabled {
            background: transparent;
            cursor: default;
        }

        .equal {
            background: #4CAF50;
            color: white;
        }

        .clear {
            background: red;
            color: rgb(214, 173, 173);
        }

        .history-panel {
            width: 250px;
            background: rgb(203, 214, 206);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(241, 238, 238, 0.1);
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .history-panel h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
            font-size: 18px;
        }

        #history-list {
            list-style: none;
            padding: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: #f9f9f9;
        }

        .history-item .expr {
            color: #888;
            display: block;
            font-size: 12px;
        }

        .history-item .res {
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-clear-history {
            margin-top: 10px;
            padding: 8px;
            background: #f44336;
            color: white;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">*</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
            <button disabled></button>
        </div>
    </div>

    <div class="history-panel">
        <h3>Riwayat</h3>
        <div id="history-list">
            <p style="color: #aaa; font-size: 12px;">Belum ada riwayat...</p>
        </div>
        <button onclick="clearHistory()" class="btn-clear-history">Hapus Semua</button>
    </div>

    <script>
        function appendValue(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function deleteLast() {
            let display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            let display = document.getElementById("display");
            let expression = display.value;

            if (!expression) return;

            let formattedExpression = expression.replace(/(\d+)%/g, "($1/100)");

            try {
                let result = eval(formattedExpression);
                addHistory(expression, result);
                display.value = result;
            } catch {
                display.value = "Error";
            }
        }

        function addHistory(expr, res) {
            let historyList = document.getElementById("history-list");

            if (historyList.querySelector("p")) {
                historyList.innerHTML = "";
            }

            let div = document.createElement("div");
            div.className = "history-item";
            div.onclick = () => {
                document.getElementById("display").value = res;
            };

            div.innerHTML = `
                <span class="expr">${expr} =</span>
                <span class="res">${res}</span>
            `;

            historyList.insertBefore(div, historyList.firstChild);

            let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
            history.unshift({ expr, res });

            // Maksimal 10 riwayat
            history = history.slice(0, 10);

            localStorage.setItem("calcHistory", JSON.stringify(history));

            while (historyList.children.length > 10) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function clearHistory() {
            document.getElementById("history-list").innerHTML =
                '<p style="color: #aaa; font-size: 12px;">Belum ada riwayat...</p>';

            localStorage.removeItem("calcHistory");
        }

        // Keyboard support
        document.addEventListener("keydown", function(e) {
            const key = e.key;

            if (!isNaN(key) || ['+', '-', '*', '/', '.', '%'].includes(key)) {
                appendValue(key);
            } else if (key === "Enter") {
                calculate();
            } else if (key === "Backspace") {
                deleteLast();
            } else if (key === "Escape") {
                clearDisplay();
            }
        });

        // Load riwayat saat refresh
        window.onload = function () {
            let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
            let historyList = document.getElementById("history-list");

            if (history.length > 0) {
                historyList.innerHTML = "";
            }

            history.forEach(item => {
                let div = document.createElement("div");
                div.className = "history-item";
                div.onclick = () => {
                    document.getElementById("display").value = item.res;
                };

                div.innerHTML = `
                    <span class="expr">${item.expr} =</span>
                    <span class="res">${item.res}</span>
                `;

                historyList.appendChild(div);
            });
        };
    </script>

</body>
</html>
