<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana & Cek Prima</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            margin: 0;
        }

        .calculator {
            width: 280px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #display {
            width: calc(100% - 22px);
            height: 60px;
            margin-bottom: 15px;
            text-align: right;
            font-size: 24px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #f9f9f9;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #e0e0e0;
        }

        .equal {
            background: #4CAF50;
            color: white;
            grid-column: span 2;
        }

        .equal:hover {
            background: #45a049;
        }

        .clear {
            background: #ff4d4d;
            color: white;
        }

        .clear:hover {
            background: #ff3333;
        }

        .special {
            background: #2196F3;
            color: white;
        }

        .special:hover {
            background: #1e88e5;
        }

        .history-panel {
            width: 250px;
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-height: 450px;
            display: flex;
            flex-direction: column;
        }

        .history-panel h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }

        #history-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            cursor: pointer;
        }

        .history-item:hover {
            background: #f1f1f1;
        }

        .expr { color: #888; font-size: 12px; display: block; }
        .res { font-weight: bold; color: #333; }

        .btn-clear-history {
            margin-top: 10px;
            padding: 10px;
            background: #777;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" disabled placeholder="0">

        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">*</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculateSqrt()" class="special">√</button>
            <button onclick="checkPrime()" class="special">Prima</button>

            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>

    <div class="history-panel">
        <h3>Riwayat</h3>
        <div id="history-list">
            <p style="color: #aaa; font-size: 12px;">Belum ada riwayat...</p>
        </div>
        <button onclick="clearHistory()" class="btn-clear-history">Hapus Riwayat</button>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            if (!display.value) return;
            try {
                let expr = display.value.replace(/(\d+)%/g, "($1/100)");
                let result = eval(expr);
                addHistory(display.value, result);
                display.value = result;
            } catch {
                display.value = "Error";
            }
        }

        function calculateSqrt() {
            if (!display.value) return;
            try {
                let currentVal = eval(display.value.replace(/(\d+)%/g, "($1/100)"));
                if (currentVal < 0) {
                    display.value = "Error";
                    return;
                }
                let result = Math.sqrt(currentVal);
                addHistory("√(" + display.value + ")", result);
                display.value = result;
            } catch {
                display.value = "Error";
            }
        }

        // FITUR BARU: Cek Bilangan Prima
        function checkPrime() {
            if (!display.value) return;
            try {
                let num = eval(display.value.replace(/(\d+)%/g, "($1/100)"));
                
                // Bilangan prima harus berupa bilangan bulat positif > 1
                if (!Number.isInteger(num) || num <= 1) {
                    addHistory("Is " + num + " Prime?", "Bukan Prima");
                    display.value = "Bukan Prima";
                    return;
                }

                let isPrime = true;
                for (let i = 2; i <= Math.sqrt(num); i++) {
                    if (num % i === 0) {
                        isPrime = false;
                        break;
                    }
                }

                let resultText = isPrime ? "Bil. Prima" : "Bukan Prima";
                addHistory("Is " + num + " Prime?", resultText);
                display.value = resultText;

            } catch {
                display.value = "Error";
            }
        }

        function addHistory(expr, res) {
            const list = document.getElementById("history-list");
            if (list.querySelector("p")) list.innerHTML = "";

            const div = document.createElement("div");
            div.className = "history-item";
            div.onclick = () => {
                if (typeof res === 'number') display.value = res;
            };

            const formattedRes = typeof res === 'number' && !Number.isInteger(res) ? res.toFixed(4) : res;

            div.innerHTML = `<span class="expr">${expr} =</span><span class="res">${formattedRes}</span>`;
            list.insertBefore(div, list.firstChild);

            // Simpan ke LocalStorage
            let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
            history.unshift({ expr, res: formattedRes });
            localStorage.setItem("calcHistory", JSON.stringify(history.slice(0, 10)));
        }

        function clearHistory() {
            document.getElementById("history-list").innerHTML = '<p style="color: #aaa; font-size: 12px;">Belum ada riwayat...</p>';
            localStorage.removeItem("calcHistory");
        }

        window.onload = () => {
            let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
            if (history.length > 0) {
                document.getElementById("history-list").innerHTML = "";
                history.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "history-item";
                    div.onclick = () => { if (typeof item.res === 'number') display.value = item.res; };
                    div.innerHTML = `<span class="expr">${item.expr} =</span><span class="res">${item.res}</span>`;
                    document.getElementById("history-list").appendChild(div);
                });
            }
        };
    </script>
</body>
</html>
